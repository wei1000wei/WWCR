<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WWCR - 管理界面</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .admin-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        
        .admin-title {
            font-size: 24px;
            color: #333;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .username {
            font-weight: bold;
        }
        
        .logout-btn {
            padding: 8px 16px;
            background-color: #f44336;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        
        .logout-btn:hover {
            background-color: #d32f2f;
        }
        
        .admin-nav {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .nav-btn {
            padding: 8px 16px;
            background-color: #2196F3;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }
        
        .nav-btn:hover {
            background-color: #1976D2;
        }
        
        .nav-btn.active {
            background-color: #4CAF50;
        }
        
        .admin-content {
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            padding: 20px;
        }
        
        .section-title {
            font-size: 20px;
            color: #333;
            margin-bottom: 20px;
        }
        
        .users-table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .users-table th,
        .users-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        
        .users-table th {
            background-color: #f5f5f5;
            font-weight: bold;
        }
        
        .action-btn {
            padding: 6px 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-right: 5px;
        }
        
        .verify-btn {
            background-color: #4CAF50;
            color: white;
        }
        
        .verify-btn:hover {
            background-color: #45a049;
        }
        
        .admin-btn {
            background-color: #2196F3;
            color: white;
        }
        
        .admin-btn:hover {
            background-color: #1976D2;
        }
        
        .user-btn {
            background-color: #FF9800;
            color: white;
        }
        
        .user-btn:hover {
            background-color: #F57C00;
        }
        
        .status {
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
        }
        
        .status.verified {
            background-color: #4CAF50;
            color: white;
        }
        
        .status.unverified {
            background-color: #FF9800;
            color: white;
        }
        
        .role {
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
        }
        
        .role.owner {
            background-color: #f44336;
            color: white;
        }
        
        .role.admin {
            background-color: #2196F3;
            color: white;
        }
        
        .role.user {
            background-color: #9E9E9E;
            color: white;
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <div class="admin-header">
            <h1 class="admin-title">WWCR 管理界面</h1>
            <div class="user-info">
                <span class="username" id="username"></span>
                <button class="logout-btn" id="logout-btn">退出</button>
            </div>
        </div>
        
        <div class="admin-nav">
            <a href="home.html" class="nav-btn">返回主页</a>
        </div>
        
        <div class="admin-content">
            <h2 class="section-title">用户管理</h2>
            <table class="users-table">
                <thead>
                    <tr>
                        <th>用户名</th>
                        <th>真实姓名</th>
                        <th>洛谷号+详细信息</th>
                        <th>角色</th>
                        <th>状态</th>
                        <th>注册时间</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="users-table-body">
                    <!-- Users will be populated here -->
                </tbody>
            </table>
        </div>
    </div>
    
    <script src="js/admin.js"></script>
</body>
</html>
